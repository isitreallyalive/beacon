[workspace]
resolver = "3"
members = ["src/bin", "src/lib/config", "src/lib/net/query"]

[workspace.package]
version = "0.0.0"
edition = "2024"

[workspace.dependencies]
cargo-husky = { version = "1.5.0", default-features = false }
bevy_ecs = "0.17.2"
beacon-config = { path = "src/lib/config" }
serde = "1.0.228"
toml = "0.9.8"
bevy_utils = "0.17.2"
crossbeam-channel = "0.5.15"
notify = "8.2.0"
thiserror = "2.0.17"
tracing = "0.1.41"
tracing-subscriber = "0.3.20"
beacon-query = { path = "src/lib/net/query" }
