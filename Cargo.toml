[workspace]
resolver = "3"
members = ["src/bin", "src/lib/config", "src/lib/net", "src/lib/net/crates/java", "src/lib/net/crates/msmp", "src/lib/net/crates/query", "src/lib/net/crates/rcon"]

[workspace.package]
version = "0.0.0"
edition = "2024"

[workspace.dependencies]
cargo-husky = { version = "1.5.0", default-features = false }
bevy_ecs = "0.17.2"
beacon-config = { path = "src/lib/config" }
serde = "1.0.228"
toml = "0.9.8"
bevy_utils = "0.17.2"
crossbeam-channel = "0.5.15"
notify = "8.2.0"
thiserror = "2.0.17"
tracing = "0.1.41"
tracing-subscriber = "0.3.20"
beacon-query = { path = "src/lib/net/crates/query" }
rand = "0.9.2"
beacon-java = { path = "src/lib/net/crates/java" }
beacon-msmp = { path = "src/lib/net/crates/msmp" }
beacon-net = { path = "src/lib/net" }
beacon-rcon = { path = "src/lib/net/crates/rcon" }
deku = "0.20.0"
indexmap = "2.12.0"
jsonrpc-core = "18.0.0"
serde_json = "1.0.145"
tungstenite = "0.28.0"
