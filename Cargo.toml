[workspace]
members = ["beacon", "beacon-config", "beacon-data", "beacon-java", "beacon-query", "beacon-tui"]
resolver = "3"

[workspace.package]
version = "0.0.0"
edition = "2024"

[workspace.dependencies]
beacon-query = { path = "beacon-query" }
tokio = "1.48.0"
tracing = "0.1.43"
deku = "0.20.2"
rand = "0.9.2"
indexmap = "2.12.1"
beacon-data = { path = "beacon-data" }
cargo-husky = { version = "1.5.0", default-features = false }
beacon-config = { path = "beacon-config" }
serde = "1.0.228"
toml = "0.9.8"
notify = "8.2.0"
kameo = "0.19.2"
kameo_actors = "0.4.0"
thiserror = "2.0.17"
futures = "0.3.31"
beacon-tui = { path = "beacon-tui" }
crossterm = "0.29.0"
ratatui = "0.29.0"
cargo_metadata = "0.23.1"
log = "0.4.28"
pastey = "0.2.0"
tracing-subscriber = "0.3.22"
tui-logger = "0.17.4"
beacon-java = { version = "0.0.0", path = "beacon-java" }
