[workspace]
members = ["beacon", "beacon-config", "beacon-data", "beacon-query", "beacon-util"]
resolver = "3"

[workspace.package]
version = "0.0.0"
edition = "2024"

[workspace.dependencies]
beacon-query = { path = "beacon-query" }
tokio = "1.48.0"
tracing = "0.1.41"
tracing-subscriber = "0.3.20"
deku = "0.20.0"
rand = "0.9.2"
serial_test = "3.2.0"
indexmap = "2.12.1"
beacon-data = { path = "beacon-data" }
cargo-husky = { version = "1.5.0", default-features = false }
beacon-config = { path = "beacon-config" }
serde = "1.0.228"
toml = "0.9.8"
notify = "8.2.0"
async-trait = "0.1.89"
beacon-util = { version = "0.0.0", path = "beacon-util" }
