[workspace]
resolver = "3"
members = ["src/bin", "src/lib/config"]

[workspace.package]
version = "0.0.0"
edition = "2024"

[workspace.dependencies]
cargo-husky = { version = "1.5.0", default-features = false }
bevy_ecs = "0.17.2"
beacon-config = { path = "src/lib/config" }
serde = "1.0.228"
toml = "0.9.8"
